name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Full history (not the default shallow clone) — this job runs `npm run
      # build:web` -> prebuild:web -> scripts/check-testdata-parser-published.js,
      # which needs git log on packages/parsers/ to detect source drift since the
      # crate's last version bump; a shallow clone makes it silently skip that check.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: pip install zensical

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Build documentation site
        run: zensical build --clean
        env:
          ZENSICAL: zensical

      - name: Copy web app into site
        run: cp -r dist site/app

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - uses: actions/deploy-pages@v5
        id: deployment
