name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Release flow: each build job produces its platform's bundles, renames them to a
# consistent, human-readable scheme, and uploads them to a single GitHub release.
# tauri-action is used for *building only* (createRelease: false) so we control the
# final asset names — Tauri's bundler emits inconsistent names (underscores vs
# dashes, an rpm "-1" suffix, cryptic arch tokens) that confuse users on the
# release page. Naming scheme: tsmap-<version>-<os>-<arch/variant>.<ext>
jobs:
  test:
    uses: ./.github/workflows/test.yml

  # One job creates the release shell up front so every build job uploads into it.
  create-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Create release with download guide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > notes.md <<'EOF'
          ## Which download do I need?

          | Your system | Download |
          | --- | --- |
          | **Windows 10 / 11** | `tsmap-VERSION-windows-x64.msi` |
          | **Mac — Apple Silicon** (M1/M2/M3/M4) | `tsmap-VERSION-macos-apple-silicon.dmg` |
          | **Mac — Intel** | `tsmap-VERSION-macos-intel.dmg` |
          | **Linux — RHEL 8/9, Rocky, Alma** (engineering/R&D networks) | `tsmap-VERSION-linux-rhel8plus-x86_64.AppImage` |
          | **Linux — Ubuntu/Debian** (installer) | `tsmap-VERSION-linux-x86_64.deb` |
          | **Linux — Fedora / modern RHEL** (installer) | `tsmap-VERSION-linux-x86_64.rpm` |
          | **Linux — other / portable** (no install) | `tsmap-VERSION-linux-x86_64.AppImage` |

          **Not sure on Mac?**  Apple menu → About This Mac. "Apple M…" = Apple Silicon; "Intel" = Intel.

          **AppImage** needs no installation: download, `chmod +x` it, and run. The
          `rhel8plus` build is compiled against an older glibc so it runs on RHEL 8 and
          newer; the plain Linux AppImage targets current distros (Ubuntu 22.04+).

          **No install possible?** A browser version is available — no download needed.
          EOF
          sed -i "s/VERSION/${GITHUB_REF_NAME#v}/g" notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            --repo "$GITHUB_REPOSITORY" || \
          gh release edit "$GITHUB_REF_NAME" --notes-file notes.md --repo "$GITHUB_REPOSITORY"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      # Build only — we rename and upload ourselves below.
      - uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }}

      - name: Rename and upload artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          B="target/${TARGET}/release/bundle"
          stage="$(mktemp -d)"

          copyas() { # copyas <glob> <newname>  — no-op if glob matches nothing
            local matches=( $1 )
            [ -e "${matches[0]}" ] || { echo "skip (not found): $1"; return 0; }
            cp "${matches[0]}" "$stage/$2"
            echo "staged: $2"
          }

          case "$TARGET" in
            x86_64-pc-windows-msvc)
              copyas "$B/msi/*.msi"           "tsmap-${VERSION}-windows-x64.msi"
              copyas "$B/nsis/*-setup.exe"    "tsmap-${VERSION}-windows-x64-setup.exe"
              ;;
            x86_64-apple-darwin)
              copyas "$B/dmg/*.dmg"           "tsmap-${VERSION}-macos-intel.dmg"
              ;;
            aarch64-apple-darwin)
              copyas "$B/dmg/*.dmg"           "tsmap-${VERSION}-macos-apple-silicon.dmg"
              ;;
            x86_64-unknown-linux-gnu)
              copyas "$B/appimage/*.AppImage" "tsmap-${VERSION}-linux-x86_64.AppImage"
              copyas "$B/deb/*.deb"           "tsmap-${VERSION}-linux-x86_64.deb"
              copyas "$B/rpm/*.rpm"           "tsmap-${VERSION}-linux-x86_64.rpm"
              ;;
          esac

          # .app.tar.gz updater bundles are deliberately not uploaded — they duplicate
          # the .dmg and only confused users on the release page.

          shopt -s nullglob
          files=( "$stage"/* )
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          fi

  # Linux build with an old-enough glibc to run on RHEL 8 / Rocky 8 / Alma 8
  # (glibc 2.28) and above. The ubuntu-22.04 build above links glibc 2.35 and will
  # NOT start on RHEL 8 — this job is the one to hand to engineers on RHEL 8/9
  # prod/R&D networks. Runs inside a rockylinux:8 container so the binary links
  # el8's glibc; the artifact name carries "rhel8plus" so its floor is obvious.
  build-el8:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: rockylinux:8
    steps:
      - name: Install build toolchain
        run: |
          dnf -y install dnf-plugins-core epel-release
          dnf config-manager --set-enabled powertools
          dnf -y groupinstall "Development Tools"
          dnf -y install \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            openssl-devel \
            curl wget file \
            patchelf

      - uses: actions/checkout@v4

      - name: Install Node 22 and GitHub CLI
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
          dnf -y install nodejs
          # gh is not present in the rockylinux:8 container (unlike hosted runners).
          dnf -y install 'dnf-command(config-manager)'
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf -y install gh

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-unknown-linux-gnu --bundles appimage

      - name: Rename and upload el8 AppImage
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          src=( target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage )
          dest="tsmap-${VERSION}-linux-rhel8plus-x86_64.AppImage"
          cp "${src[0]}" "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber --repo "$GITHUB_REPOSITORY"
