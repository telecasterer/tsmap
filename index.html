<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tsmap</title>
    <script type="module" src="/src/main.ts" defer></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; background: #1a1a1a; color: #eee; font-family: sans-serif; }
      #app { display: flex; flex-direction: column; height: 100%; }

      #toolbar {
        display: flex; align-items: center; gap: 12px;
        padding: 6px 12px; background: #111; border-bottom: 1px solid #333;
        font-size: 13px; flex-shrink: 0;
      }
      #toolbar-title { font-weight: 600; color: #ccc; margin-right: 4px; }

      #drop-zone {
        display: flex; align-items: center; gap: 8px;
        padding: 4px 10px; border: 1px dashed #444; border-radius: 4px;
        cursor: pointer; transition: border-color 0.15s, background 0.15s;
      }
      #drop-zone:hover, #drop-zone.drag-over { border-color: #6af; background: #1e2a38; }
      #open-btn {
        background: none; border: 1px solid #6af; border-radius: 4px;
        color: #6af; font-size: 12px; padding: 3px 10px; cursor: pointer;
        white-space: nowrap;
      }
      #open-btn:hover { background: #1e2a38; }
      #file-input { display: none; }
      #file-label { font-size: 12px; color: #888; }

      #map-container { flex: 1; min-height: 0; position: relative; }
      #map-container.single { display: flex; align-items: center; justify-content: center; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <span id="toolbar-title">tsmap</span>
        <div id="drop-zone">
          <button id="open-btn">Open file</button>
          <input id="file-input" type="file" accept=".csv,.json,.stdf,.std,.atdf,.atd" />
        </div>
        <span>or drop a file anywhere</span>
        <span id="file-label"></span>
      </div>
      <div id="map-container"></div>
    </div>
  </body>
</html>
