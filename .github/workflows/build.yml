name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Release flow: each build job produces its platform's bundles, renames them to a
# consistent, human-readable scheme, and uploads them to a single GitHub release.
# tauri-action is used for *building only* (createRelease: false) so we control the
# final asset names — Tauri's bundler emits inconsistent names (underscores vs
# dashes, an rpm "-1" suffix, cryptic arch tokens) that confuse users on the
# release page. Naming scheme: tsmap-<version>-<os>-<arch/variant>.<ext>
jobs:
  test:
    uses: ./.github/workflows/test.yml

  # One job creates the release shell up front so every build job uploads into it.
  create-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Create release with download guide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > notes.md <<'EOF'
          ## Which download do I need?

          | Your system | Download |
          | --- | --- |
          | **Windows 10 / 11** | `tsmap-VERSION-windows-x64.msi` |
          | **Mac — Apple Silicon** (any M-series: M1–M5 and newer) | `tsmap-VERSION-macos-apple-silicon.dmg` |
          | **Mac — Intel** | `tsmap-VERSION-macos-intel.dmg` |
          | **Linux — Ubuntu / Debian** (installer) | `tsmap-VERSION-linux-x86_64.deb` |
          | **Linux — Fedora** (installer) | `tsmap-VERSION-linux-x86_64.rpm` |
          | **Linux — other / portable** (no install) | `tsmap-VERSION-linux-x86_64.AppImage` |
          | **Linux — RHEL / Rocky / Alma 8 or 9** | [browser version](https://telecasterer.github.io/tsmap/app/) — no install |

          **Not sure on Mac?**  Apple menu → About This Mac. "Apple M…" = Apple Silicon; "Intel" = Intel.

          **AppImage** needs no installation: download, `chmod +x` it, and run. It targets
          current distributions (glibc 2.35+ / Ubuntu 22.04 and newer).

          **On RHEL / Rocky / Alma?** The desktop app's webview needs newer system libraries
          than those releases ship — run the [browser version](https://telecasterer.github.io/tsmap/app/)
          instead. It works in any modern browser, with no install.
          EOF
          sed -i "s/VERSION/${GITHUB_REF_NAME#v}/g" notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            --repo "$GITHUB_REPOSITORY" || \
          gh release edit "$GITHUB_REF_NAME" --notes-file notes.md --repo "$GITHUB_REPOSITORY"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      # Full history (not the default shallow clone) — this build runs `npm run
      # build` -> prebuild -> scripts/check-testdata-parser-published.js, which
      # needs git log on packages/parsers/ to detect source drift since the
      # crate's last version bump; a shallow clone makes it silently skip that check.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      # Build only — we rename and upload ourselves below.
      - uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }}

      - name: Rename and upload artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          B="target/${TARGET}/release/bundle"
          stage="$(mktemp -d)"

          copyas() { # copyas <glob> <newname>  — no-op if glob matches nothing
            local matches=( $1 )
            [ -e "${matches[0]}" ] || { echo "skip (not found): $1"; return 0; }
            cp "${matches[0]}" "$stage/$2"
            echo "staged: $2"
          }

          case "$TARGET" in
            x86_64-pc-windows-msvc)
              copyas "$B/msi/*.msi"           "tsmap-${VERSION}-windows-x64.msi"
              copyas "$B/nsis/*-setup.exe"    "tsmap-${VERSION}-windows-x64-setup.exe"
              ;;
            x86_64-apple-darwin)
              copyas "$B/dmg/*.dmg"           "tsmap-${VERSION}-macos-intel.dmg"
              ;;
            aarch64-apple-darwin)
              copyas "$B/dmg/*.dmg"           "tsmap-${VERSION}-macos-apple-silicon.dmg"
              ;;
            x86_64-unknown-linux-gnu)
              copyas "$B/appimage/*.AppImage" "tsmap-${VERSION}-linux-x86_64.AppImage"
              copyas "$B/deb/*.deb"           "tsmap-${VERSION}-linux-x86_64.deb"
              copyas "$B/rpm/*.rpm"           "tsmap-${VERSION}-linux-x86_64.rpm"
              ;;
          esac

          # .app.tar.gz updater bundles are deliberately not uploaded — they duplicate
          # the .dmg and only confused users on the release page.

          shopt -s nullglob
          files=( "$stage"/* )
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          fi

  # NOTE: a native RHEL 8/9 build is deliberately NOT provided. Investigated and
  # rejected (2026-06-22): RHEL 8 ships glib 2.56 and RHEL 9 ships glib 2.68, both
  # below the >= 2.70 that the gtk-rs `gobject-sys` crate requires — the el8 build
  # fails outright. el9 compiles but the artifact links webkit2gtk-4.1 / libsoup-3.0
  # (neither packaged on el9, which only has the 4.0 ABI) and demands GLIBC_2.39
  # (el9 has 2.34), so it cannot launch there. RHEL users are pointed to the web
  # build instead. Revisit on RHEL 10 (glibc 2.39, webkit-4.1 available).
