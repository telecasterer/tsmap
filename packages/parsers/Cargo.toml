[package]
name = "testdata-parser"
version = "0.4.0"
edition = "2021"
description = "Rust/WASM parsers for semiconductor test data formats (STDF, ATDF, CSV, JSON)"
repository = "https://github.com/paulrobins/tsmap"
license = "MIT"

[package.metadata.npm]
name = "@paulrobins/testdata-parser"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O3"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["dep:tokio"]
wasm = ["dep:wasm-bindgen", "dep:serde-wasm-bindgen", "dep:js-sys", "dep:console_error_panic_hook"]
bench = []   # enables parse_stdf_from_bytes_timed

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
csv = "1"
indexmap = "2"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
js-sys = { version = "0.3", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

[dev-dependencies]
tempfile = "3"
