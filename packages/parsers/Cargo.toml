[package]
name = "tsmap-parsers"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["dep:tokio"]
wasm = ["dep:wasm-bindgen", "dep:serde-wasm-bindgen", "dep:getrandom", "flate2/rust_backend"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rust-stdf = "0.3.1"
csv = "1"
indexmap = "2"
flate2 = "1"
zip = "8"
tokio = { version = "1", features = ["rt", "rt-multi-thread"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
getrandom = { version = "0.2", features = ["js"], optional = true }

[dev-dependencies]
tempfile = "3"
